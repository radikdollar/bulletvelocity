<!DOCTYPE html>
<html lang="ru" xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Баллистический маятник</title>
    <!-- Правильное подключение стилей Thymeleaf из папки static -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-leopard">

<div id="simulation-container">
    <svg id="scale-container"></svg>
    <div class="launcher-station" id="launcher">
        <div class="launcher-barrel">
            <div class="muzzle-flash" id="flash"></div>
        </div>
    </div>
    <div class="flying-bullet" id="bullet"></div>
    <div class="pendulum-pivot"></div>
    <div class="pendulum-system" id="pendulum">
        <div class="wire"></div>
        <div class="block">
            <div class="target-plate"></div>
            M
        </div>
    </div>
</div>

<div class="zoom-panel">
    <!-- Кнопки зума оставляем на JS, так как это просто визуал -->
    <span class="zoom-icon" onclick="changeZoom(-0.05)" title="Отдалить">−</span>
    <input type="range" id="zoomScale" min="0.4" max="2.0" step="0.05" value="1.0" oninput="setZoom(this.value)">
    <span class="zoom-icon" onclick="changeZoom(0.05)" title="Приблизить">+</span>
    <div style="width: 1px; height: 20px; background: rgba(0,0,0,0.2); margin: 0 5px; box-shadow: 1px 0 0 rgba(255,255,255,0.5);"></div>
    <span class="zoom-icon" onclick="resetView()" title="Сбросить камеру" style="font-size: 20px;">⟲</span>
</div>

<div class="bg-switcher" onclick="cycleBackground()" title="Сменить фон">🖼️</div>

<aside class="control-panel">
    <div class="window-controls">
        <a th:href="@{/}" class="dot red" style="cursor: pointer;" title="Сброс"></a>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
    </div>

    <div class="panel-header">
        <h2>Experiment Settings</h2>
    </div>

    <!-- НАЧАЛО ФОРМЫ: Данные отправляются на адрес /calculate -->
    <form th:action="@{/calculate}" method="post">
        <div class="inputs-container">
            <div class="input-group">
                <label>Масса пули (m)</label>
                <div class="input-wrapper">
                    <!-- name="bulletMass" должен совпадать с названием в CalculationRequest -->
                    <input type="number" name="bulletMass" th:value="${request.bulletMass}" step="0.1" min="0.1">
                    <span class="unit">г</span>
                </div>
            </div>

            <div class="input-group">
                <label>Масса маятника (M)</label>
                <div class="input-wrapper">
                    <input type="number" name="pendulumMass" th:value="${request.pendulumMass}" step="0.1" min="0.1">
                    <span class="unit">кг</span>
                </div>
            </div>

            <div class="input-group">
                <label>Высота подъема (h)</label>
                <div class="input-wrapper">
                    <input type="number" name="height" th:value="${request.height}" step="0.1" min="0.1">
                    <span class="unit">см</span>
                </div>
            </div>
        </div>

        <div class="button-group">
            <!-- Кнопка submit запускает отправку формы -->
            <button type="submit" id="fireBtn">Выстрел</button>
            <a th:href="@{/}" class="btn-reset" style="text-decoration: none; text-align: center; display: inline-flex; align-items: center; justify-content: center;">Сброс</a>
        </div>
    </form>
    <!-- КОНЕЦ ФОРМЫ -->

    <div class="result-box">
        <div class="result-title">Скорость пули</div>
        <div class="result-value" id="velocity-result">
            <!-- Thymeleaf подставит сюда результат. Если его пока нет, покажет 0.00 -->
            <span th:text="${result != null ? result.formattedVelocity : '0.00'}">0.00</span> <span>м/с</span>
        </div>
    </div>
</aside>

<!-- Подключение JS (Только для анимаций и визуала!) -->
<script th:src="@{/js/script.js}"></script>
</body>
</html>
