<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Баллистический маятник</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-leopard">

<!-- КОНТЕЙНЕР ДЛЯ МАСШТАБИРОВАНИЯ (Группирует все объекты симуляции) -->
<div id="simulation-container">
    <!-- Шкала (Генерируется через JS) -->
    <svg id="scale-container"></svg>

    <!-- 1. Стендовая пушка -->
    <div class="launcher-station" id="launcher">
        <div class="launcher-barrel">
            <div class="muzzle-flash" id="flash"></div>
        </div>
    </div>

    <!-- 2. Летящая пуля -->
    <div class="flying-bullet" id="bullet"></div>

    <!-- 3. Система маятника -->
    <div class="pendulum-pivot"></div>
    <div class="pendulum-system" id="pendulum">
        <div class="wire"></div>
        <div class="block">
            <div class="target-plate"></div>
            M
        </div>
    </div>
</div>

<!-- Панель зума (Внизу по центру) -->
<div class="zoom-panel">
    <span class="zoom-icon" onclick="changeZoom(-0.05)" title="Отдалить">−</span>
    <input type="range" id="zoomScale" min="0.4" max="2.0" step="0.05" value="1.0" oninput="setZoom(this.value)">
    <span class="zoom-icon" onclick="changeZoom(0.05)" title="Приблизить">+</span>
    <div style="width: 1px; height: 20px; background: rgba(0,0,0,0.2); margin: 0 5px; box-shadow: 1px 0 0 rgba(255,255,255,0.5);"></div>
    <span class="zoom-icon" onclick="resetView()" title="Сбросить камеру" style="font-size: 20px;">⟲</span>
</div>

<!-- Иконка смены фона -->
<div class="bg-switcher" onclick="cycleBackground()" title="Сменить фон (Стиль Apple)">🖼️</div>

<!-- 4. Панель управления -->
<aside class="control-panel">
    <div class="window-controls">
        <div class="dot red" onclick="resetSimulation()" style="cursor: pointer;" title="Сброс"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
    </div>

    <div class="panel-header">
        <h2>Experiment Settings</h2>
    </div>

    <div class="inputs-container">
        <div class="input-group">
            <label>Масса пули (m)</label>
            <div class="input-wrapper">
                <input type="number" id="bulletMass" value="9.0" step="0.1" min="0.1">
                <span class="unit">г</span>
            </div>
        </div>

        <div class="input-group">
            <label>Масса маятника (M)</label>
            <div class="input-wrapper">
                <input type="number" id="pendulumMass" value="5.0" step="0.1" min="0.1">
                <span class="unit">кг</span>
            </div>
        </div>

        <div class="input-group">
            <label>Высота подъема (h)</label>
            <div class="input-wrapper">
                <input type="number" id="height" value="15.0" step="0.1" min="0.1">
                <span class="unit">см</span>
            </div>
        </div>

        <!-- Контроль времени (Slow-Mo) -->
        <div class="input-group" style="margin-top: 5px;">
            <label><span>Скорость времени</span> <span id="timeVal">1.0x</span></label>
            <input type="range" id="timeScale" min="0.1" max="1.0" step="0.1" value="1.0" oninput="updateTimeScale(this.value)">
        </div>
    </div>

    <div class="button-group">
        <button id="fireBtn" onclick="performExperiment()">Выстрел</button>
        <button id="resetBtn" class="btn-reset" onclick="resetSimulation()">Сброс</button>
    </div>

    <div class="result-box">
        <div class="result-title">Скорость пули</div>
        <div class="result-value" id="velocity-result">0.00 <span>м/с</span></div>
    </div>
</aside>
<script src="js/script.js"></script>
</body>
</html>
